[pytest]
# Pytest configuration for Truck Maintenance project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    
# Minimum Python version
minversion = 3.8

# Custom markers (also defined in conftest.py)
markers =
    api: API endpoint tests
    admin: Admin panel tests
    performance: Performance and load tests (deselect with '-m "not performance"')
    unit: Unit tests for individual components
    integration: Integration tests for feature workflows
    slow: Slow running tests (deselect with '-m "not slow"')

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# --cov=backend
# --cov-report=html
# --cov-report=term-missing

# Console output styling
console_output_style = progress

# Log settings
log_cli = false
log_cli_level = INFO

